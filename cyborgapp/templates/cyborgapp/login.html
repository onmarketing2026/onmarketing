{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Cyborg - Login</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="{% static 'img/logo.jpeg' %}">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #cba135;
            --primary-gold-hover: #b8912d;
            --main-bg: #f4f6f9;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border-gold: rgba(203, 161, 53, 0.3);
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --input-bg: rgba(255, 255, 255, 0.7);
            --input-border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 20px 0;
        }

        /* Light animated background */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #ffffff 0%, var(--main-bg) 70%);
            z-index: 0;
        }

        .bg-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(rgba(203, 161, 53, 0.15) 1px, transparent 1px),
                radial-gradient(rgba(203, 161, 53, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            z-index: 0;
            opacity: 0.6;
        }

        .login-container {
            position: relative;
            z-index: 1;
            display: flex;
            width: 1000px;
            max-width: 90%;
            height: 600px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), 0 0 40px rgba(203, 161, 53, 0.15);
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-gold);
            animation: slideUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-branding {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(245,245,245,0.9) 100%);
            border-right: 1px solid var(--border-gold);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        
        /* Ambient light from behind logo */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-gold);
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.25; }
        }

        .login-branding img {
            width: 100%;
            max-width: 350px;
            z-index: 2;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
            transition: transform 0.5s ease, filter 0.5s ease;
        }

        .login-branding img:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 15px 30px rgba(203, 161, 53, 0.25));
        }

        .login-form-container {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: transparent;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1a1a1a;
            letter-spacing: 0.5px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .form-control::placeholder {
            color: rgba(0, 0, 0, 0.3);
        }

        .form-control:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 3px rgba(203, 161, 53, 0.15);
            background: #ffffff;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            font-size: 0.85rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.3s;
        }

        .checkbox-container:hover {
            color: var(--text-main);
        }

        .checkbox-container input {
            display: none;
        }

        .checkmark {
            width: 18px;
            height: 18px;
            border: 1px solid rgba(0,0,0,0.2);
            background-color: #fff;
            border-radius: 4px;
            margin-right: 10px;
            position: relative;
            transition: all 0.2s ease;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--primary-gold);
            border-color: var(--primary-gold);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 6px;
            top: 2px;
            width: 4px;
            height: 8px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .forgot-password {
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--primary-gold-hover);
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #b8912d 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(203, 161, 53, 0.3);
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover::after {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(203, 161, 53, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(203, 161, 53, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                height: auto;
                max-width: 450px;
                margin: 20px;
            }
            .login-branding {
                padding: 40px 20px;
                border-right: none;
                border-bottom: 1px solid var(--border-gold);
            }
            .login-form-container {
                padding: 40px 30px;
            }
            .login-branding img {
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="bg-particles"></div>
    
    <div class="login-container">
        <div class="login-branding">
            <div class="glow"></div>
            <!-- Please ensure the logo is saved as static/img/logo.jpeg -->
            <img src="{% static 'img/logo.jpeg' %}" alt="ON CYBORG Logo" onerror="this.src='https://via.placeholder.com/300x300/ffffff/cba135?text=ON+CYBORG'">
        </div>
        <div class="login-form-container">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Initialize connection to your terminal.</p>
            </div>
            <form action="" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username / Email <span style="color: red;">*</span></label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter your identifier" required>
                </div>
                <div class="form-group">
                    <label for="password">Security Key <span style="color: red;">*</span></label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter security key" required>
                </div>
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="{% url 'password_reset' %}" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="btn-submit">Authenticate</button>
            </form>
        </div>
    </div>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // SweetAlert for Django Messages
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true,
            });

            {% if messages %}
                {% for message in messages %}
                    Toast.fire({
                        icon: '{% if message.tags == "error" %}error{% else %}{{ message.tags }}{% endif %}',
                        title: '{{ message }}'
                    });
                {% endfor %}
            {% endif %}
        });
    </script>
</body>
</html>
