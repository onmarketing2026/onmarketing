<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Cyborg - Reset Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gold: #cba135;
            --main-bg: #f4f6f9;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --border-gold: rgba(203, 161, 53, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--main-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 0;
        }

        .reset-container {
            width: 450px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-gold);
            text-align: center;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #198754;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(25, 135, 84, 0.2);
        }

        h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 15px; color: #1a1a1a; }
        p { color: #666; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.6; }

        .btn-submit {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: var(--primary-gold);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(203, 161, 53, 0.2); }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="icon-box">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h2>Password Updated!</h2>
        <p>Your security key has been successfully changed. You can now use your new password to access your terminal.</p>
        
        <a href="{% url 'login' %}" class="btn-submit">Login Now</a>
    </div>
</body>
</html>
