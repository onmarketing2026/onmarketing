<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Cyborg - Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gold: #cba135;
            --main-bg: #f4f6f9;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --border-gold: rgba(203, 161, 53, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--main-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 0;
        }

        .reset-container {
            width: 450px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-gold);
            text-align: center;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: var(--primary-gold);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(203, 161, 53, 0.3);
        }

        h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; color: #1a1a1a; }
        p { color: #666; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.6; }

        .form-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #666; font-weight: 700; margin-bottom: 8px; }
        
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--primary-gold); box-shadow: 0 0 0 4px rgba(203, 161, 53, 0.1); }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary-gold);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(203, 161, 53, 0.2); }
        
        .back-link { margin-top: 25px; display: block; color: var(--primary-gold); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="icon-box">
            <i class="fa-solid fa-key"></i>
        </div>
        <h2>Forgot Password?</h2>
        <p>Enter your email address and we'll send you a secure link to reset your password.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                {{ form.email }}
                {% if form.email.errors %}
                <small style="color: #dc3545; display: block; margin-top: 5px;">{{ form.email.errors.0 }}</small>
                {% endif %}
            </div>
            <button type="submit" class="btn-submit">Send Reset Link</button>
        </form>
        
        <a href="{% url 'login' %}" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
    </div>
</body>
</html>
